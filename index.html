<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Which door?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4f5; /* soft neutral */
      color: #3f3f46;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 28px;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 30px;
      max-width: 400px;
      margin: auto;
    }

    .card {
      background: #e4e4e7; /* pastel dull */
      padding: 30px;
      border-radius: 18px;
      text-decoration: none;
      color: #27272a;
      font-size: 18px;
      font-weight: 500;
      transition: 0.2s;
    }

    .card:hover {
      background: #d4d4d8;
      transform: scale(1.02);
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #71717a;
    }
  </style>
</head>

<body>

  <h1>Which door?</h1>

  <div class="grid">

    <a href="./protein-tracker/" class="card">
      Track Water
    </a>

    <a href="./workout-tracker/" class="card">
      Track Sweat
    </a>

  </div>

  <footer>
    'raam
  </footer>

</body>
</html>
