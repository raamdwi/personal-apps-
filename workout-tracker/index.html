<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combat Training Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --border: #2a2a2a;
  --border-light: #222;
  --text: #e8e6e0;
  --muted: #666;
  --dim: #333;
  --accent: #c8f060;
  --accent-dim: #8aaa35;
  --red: #ff5a3c;
  --blue: #4aa8ff;
  --amber: #ffb830;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 2rem 1rem;
  max-width: 480px;
  margin: 0 auto;
}

.header {
  margin-bottom: 2rem;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.5rem;
}
.title {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.2;
}
.title em {
  font-style: italic;
  color: var(--accent);
}
.week-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4px;
}

.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1.75rem;
}
.progress-track {
  flex: 1;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.4s ease;
}
.progress-count {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.days-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 2rem;
}

.day-row {
  border: 0.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  overflow: hidden;
  transition: border-color 0.2s;
}
.day-row.completed { border-color: var(--accent-dim); }
.day-row.rest-day { opacity: 0.6; }

.day-header {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 12px;
  user-select: none;
}
.day-header:hover { background: #1a1a1a; }
.day-row.rest-day .day-header { cursor: default; }

.day-num {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  min-width: 28px;
}
.day-info { flex: 1; }
.day-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}
.day-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}
.tag-skill { background: #1a2a0a; color: var(--accent); }
.tag-strength { background: #0a1a2a; color: var(--blue); }
.tag-abs { background: #2a1a0a; color: var(--amber); }
.tag-rest { background: #1e1e1e; color: var(--muted); }
.tag-yoga { background: #1a0a2a; color: #c084fc; }
.tag-2x { background: #2a1a0a; color: var(--red); }

.day-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.check-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--dim);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.check-btn.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.check-btn svg { display: none; }
.check-btn.checked svg { display: block; }
.chevron {
  color: var(--dim);
  font-size: 12px;
  transition: transform 0.2s;
}
.day-row.open .chevron { transform: rotate(180deg); }

.sessions-panel {
  display: none;
  border-top: 0.5px solid var(--border-light);
  padding: 0;
}
.day-row.open .sessions-panel { display: block; }

.session-block {
  border-bottom: 0.5px solid var(--border-light);
}
.session-block:last-child { border-bottom: none; }

.session-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  background: #111;
  transition: background 0.15s;
}
.session-header:hover { background: #151515; }
.session-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.session-time {
  font-size: 10px;
  color: var(--muted);
}
.session-chevron {
  color: var(--dim);
  font-size: 10px;
  transition: transform 0.2s;
}
.session-block.open .session-chevron { transform: rotate(180deg); }

.exercises-list {
  display: none;
  padding: 8px 0;
  background: #0c0c0c;
}
.session-block.open .exercises-list { display: block; }

.ex-item {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 7px 14px;
  gap: 10px;
  border-bottom: 0.5px solid #181818;
}
.ex-item:last-child { border-bottom: none; }
.ex-left { flex: 1; }
.ex-name {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 2px;
}
.ex-note {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}
.ex-dose {
  font-size: 11px;
  color: var(--accent);
  white-space: nowrap;
  font-weight: 500;
  text-align: right;
  min-width: 80px;
}

.reset-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.reset-btn:hover { border-color: var(--dim); color: var(--text); }

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.dot-skill { background: var(--accent); }
.dot-strength { background: var(--blue); }
.dot-abs { background: var(--amber); }
.dot-yoga { background: #c084fc; }
.dot-rest { background: var(--dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="title">Combat<br><em>Weekly</em></div>
      <div class="week-label">Phase 1 — no equipment</div>
    </div>
  </div>
</div>

<div class="progress-row">
  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="progress-count" id="prog-txt">0 / 5 done</div>
</div>

<div class="days-list" id="days-list"></div>
<button class="reset-btn" onclick="resetAll()">reset week</button>

<script>
const schedule = [
  {
    day: "Mon", label: "Striking skill",
    tags: [["skill","tag-skill"],["morning","tag-rest"]],
    rest: false, twoA: false,
    sessions: [
      {
        title: "Yoga warm-up", time: "10 min", dot: "dot-yoga",
        exercises: [
          {name:"Cat-Cow", dose:"2 min", note:"Spine decompression before any rotation work. Non negotiable."},
          {name:"Child's Pose", dose:"90s", note:""},
          {name:"Hip 90-90 stretch", dose:"90s each side", note:"Opens hip flexors for kicks"},
          {name:"Shoulder CARs", dose:"10 each arm", note:"Controlled articular rotation — joint prep"},
          {name:"Wrist circles + knuckle prep", dose:"1 min", note:""},
          {name:"Loose shadowboxing", dose:"2 min", note:"No power. Just movement, stance, breathing."}
        ]
      },
      {
        title: "Striking skill", time: "45 min", dot: "dot-skill",
        exercises: [
          {name:"Stance and footwork", dose:"5 min", note:"Box step, pivot, lateral. Deliberate."},
          {name:"Jab mechanics — isolation", dose:"3 x 2 min", note:"Shoulder snap, hip follow, return. Precision over power."},
          {name:"Cross mechanics — isolation", dose:"3 x 2 min", note:"Hip rotation is the punch. Arm just follows."},
          {name:"Jab-cross combo", dose:"5 x 2 min", note:"Slow first, build to 70%. Head movement after every combo."},
          {name:"Body shots", dose:"3 x 2 min", note:"Liver shot right, spleen left. Dip and drive."},
          {name:"Slip and return", dose:"3 x 2 min", note:"Slip outside jab, return cross. Slip inside, return hook."},
          {name:"Cool-down shadowboxing", dose:"3 min", note:"50% intensity. Flow. End on breathing."}
        ]
      }
    ]
  },
  {
    day: "Tue", label: "Pull strength + abs",
    tags: [["strength","tag-strength"],["abs","tag-abs"],["evening","tag-rest"]],
    rest: false, twoA: false,
    sessions: [
      {
        title: "Pull strength", time: "25 min", dot: "dot-strength",
        exercises: [
          {name:"Dead hang", dose:"3 x max", note:"Decompress spine, build grip. Just hang still."},
          {name:"Negative pull-ups", dose:"5 x 3-5 reps", note:"Jump to top, lower in 5 slow seconds. Build the pull."},

      },
      {
        title: "Yoga cool-down", time: "10 min", dot: "dot-yoga",
        exercises: [
          {name:"Pigeon pose", dose:"90s each side", note:"Hip flexor recovery after striking work"},
          {name:"Supine twist", dose:"90s each side", note:"Spinal decompression"},
          {name:"Legs up the wall", dose:"3 min", note:"Blood flow reversal. Total recovery."},
          {name:"Box breathing", dose:"5 min", note:"4-4-4-4. Cortisol down before sleep."}
        ]
      }
    ]
  },
  {
    day: "Wed", label: "Kick skill + defense",
    tags: [["skill","tag-skill"],["morning","tag-rest"]],
    rest: false, twoA: false,
    sessions: [
      {
        title: "Yoga warm-up", time: "10 min", dot: "dot-yoga",
        exercises: [
          {name:"Cat-Cow", dose:"2 min", note:"Every session. Every day."},
          {name:"Child's Pose", dose:"90s", note:""},
          {name:"Hip 90-90 stretch", dose:"90s each side", note:"Critical before kick work"},
          {name:"Shoulder CARs", dose:"10 each arm", note:""},
          {name:"Leg swings — front and lateral", dose:"10 each direction each leg", note:"Dynamic hip prep specifically for kicks"},
          {name:"Loose shadowboxing", dose:"2 min", note:""}
        ]
      },
      {
        title: "Kick reactivation", time: "25 min", dot: "dot-skill",
        exercises: [
          {name:"Round kick — chamber drill", dose:"3 x 10 each leg", note:"Chamber high, snap out, return. Don't skip chamber."},
          {name:"Teep — front kick", dose:"3 x 10 each leg", note:"Hip drive forward. Push not snap."},
          {name:"Switch kick", dose:"3 x 8 each", note:"Switch, chamber, fire. Footwork is the skill."},
          {name:"Kick and punch combo", dose:"5 x 2 min", note:"Teep jab cross. Round kick cross hook."},
          {name:"Your best 3 karate combos", dose:"10 min", note:"Go back to what you know. Drill slow. Muscle memory revival."}
        ]
      },
      {
        title: "Defense and head movement", time: "20 min", dot: "dot-skill",
        exercises: [
          {name:"Slip left, slip right", dose:"4 x 2 min", note:"Outside the jab. Continuous rhythm."},
          {name:"Pull counter", dose:"3 x 2 min", note:"Pull back off jab, return cross immediately."},
          {name:"Roll under hook", dose:"3 x 2 min", note:"Outside to inside roll. Return uppercut."},
          {name:"Combo and exit", dose:"3 x 2 min", note:"Every combo ends with movement. Never stand still after punching."}
        ]
      }
    ]
  },
  {
    day: "Thu", label: "Push strength + abs",
    tags: [["strength","tag-strength"],["abs","tag-abs"],["evening","tag-rest"]],
    rest: false, twoA: false,
    sessions: [
      {
        title: "Push strength", time: "25 min", dot: "dot-strength",
        exercises: [
          {name:"Knuckle push-ups on bars", dose:"4 x 12-15", note:"Deep, controlled. Full range. Build from your 3x10 base."},
          {name:"Explosive push-up", dose:"4 x 5", note:"Hands leave floor at top. Combat pushing power."},
          {name:"Pike push-up", dose:"4 x 10", note:"Hips high, head toward floor. Shoulder pressing pattern."},
          {name:"Dumbbell lateral raise", dose:"4 x 12", note:"5-7kg. Slow up, slower down. Shoulder width = frame width."},
          {name:"Dumbbell overhead press", dose:"4 x 10", note:"7kg. Full lockout at top."},
          {name:"Band woodchop", dose:"3 x 12 each", note:"No band yet — use slow controlled twisting crunch instead."}
        ]
      },
      {
        title: "Abs block", time: "12 min", dot: "dot-abs",
        exercises: [
          {name:"Dead Bug", dose:"3 x 10", note:"Lower back flat. Hip flexors off."},
          {name:"Hollow body hold", dose:"3 x 25s", note:""},
          {name:"Dragon flag negatives", dose:"3 x 5", note:"Lower in 4 seconds. Knees bent if needed."},
          {name:"Hollow body rock", dose:"3 x 10", note:"Maintain shape. No sagging."}
        ]
      },
      {
        title: "Yoga cool-down", time: "10 min", dot: "dot-yoga",
        exercises: [
          {name:"Pigeon pose", dose:"90s each side", note:""},
          {name:"Supine twist", dose:"90s each side", note:""},
          {name:"Legs up the wall", dose:"3 min", note:""},
          {name:"Box breathing", dose:"5 min", note:""}
        ]
      }
    ]
  },
  {
    day: "Fri", label: "Full combat + abs",
    tags: [["skill","tag-skill"],["abs","tag-abs"],["2x today","tag-2x"]],
    rest: false, twoA: true,
    sessions: [
      {
        title: "Morning — yoga warm-up", time: "10 min", dot: "dot-yoga",
        exercises: [
          {name:"Cat-Cow", dose:"2 min", note:""},
          {name:"Child's Pose", dose:"90s", note:""},
          {name:"Hip 90-90 stretch", dose:"90s each side", note:""},
          {name:"Shoulder CARs + wrist prep", dose:"2 min", note:""},
          {name:"Leg swings", dose:"10 each direction each leg", note:""},
          {name:"Loose shadowboxing", dose:"2 min", note:""}
        ]
      },
      {
        title: "Morning — full shadowboxing", time: "45 min", dot: "dot-skill",
        exercises: [
          {name:"Jump rope or high knees", dose:"3 x 3 min", note:"1 min rest between. Gets heart rate to combat level."},
          {name:"Shadowboxing — hands only", dose:"3 x 3 min", note:"All combos from Mon. Full power intent."},
          {name:"Shadowboxing — kicks only", dose:"3 x 3 min", note:"All kicks from Wed. Crisp chambers."},
          {name:"Shadowboxing — full mixed", dose:"3 x 3 min", note:"Everything combined. This is your real test of the week."},
          {name:"Sprawl series", dose:"3 x 10", note:"Sprawl, base, reset stance. Explosive each time."},
          {name:"360 kick drilling", dose:"15 min", note:"Slow rotation first. Spot your landing. Build spin speed gradually. This is skill practice not fitness."}
        ]
      },
      {
        title: "Evening — grappling athleticism", time: "25 min", dot: "dot-strength",
        exercises: [
          {name:"Pull-up attempts", dose:"5 x max", note:"Dead hang then pull as high as possible. Every session."},
          {name:"Towel hang — grip training", dose:"3 x max", note:"Towel over bar. Grip closes fights in clinch."},
          {name:"Pummeling drill — solo", dose:"3 x 2 min", note:"Underhook motion against wall or air. Continuous."},
          {name:"Hip escape — shrimp", dose:"3 x room length", note:"Across floor and back. Grappling survival movement."},
          {name:"L-sit hold between chairs", dose:"3 x max", note:"Or tuck hold. Hip flexor and core together."},
          {name:"Wrist curls — dumbbell", dose:"3 x 20 each", note:"7kg. Grip strength for clinch work."}
        ]
      },
      {
        title: "Evening — abs block", time: "12 min", dot: "dot-abs",
        exercises: [
          {name:"Dead Bug", dose:"3 x 10", note:""},
          {name:"Hollow body hold", dose:"3 x 30s", note:"Push to 30s this session."},
          {name:"Dragon flag negatives", dose:"3 x 5", note:""},
          {name:"Hollow body rock", dose:"3 x 12", note:""}
        ]
      },
      {
        title: "Evening — yoga cool-down", time: "10 min", dot: "dot-yoga",
        exercises: [
          {name:"Pigeon pose", dose:"90s each side", note:""},
          {name:"Supine twist", dose:"90s each side", note:""},
          {name:"Legs up the wall", dose:"3 min", note:""},
          {name:"Box breathing", dose:"5 min", note:"You earned this."}
        ]
      }
    ]
  },
  {
    day: "Sat", label: "Mobility and yoga",
    tags: [["yoga","tag-yoga"],["recovery","tag-rest"]],
    rest: false, twoA: false,
    sessions: [
      {
        title: "Full mobility session", time: "40 min", dot: "dot-yoga",
        exercises: [
          {name:"Cat-Cow", dose:"3 min", note:"Slow and deep. More time today."},
          {name:"Child's Pose", dose:"2 min", note:""},
          {name:"Thread the Needle", dose:"90s each side", note:""},
          {name:"Supine twist", dose:"2 min each side", note:""},
          {name:"Sphinx Pose", dose:"2 min", note:"Gentle lumbar extension."},
          {name:"Pigeon pose", dose:"2 min each side", note:"Full duration. Hip flexors need this after the week."},
          {name:"Hip 90-90 stretch", dose:"2 min each side", note:""},
          {name:"Seated forward fold", dose:"2 min", note:"Never force depth."},
          {name:"Downward Dog", dose:"5 breaths x 3", note:"Walk out hamstrings slowly."},
          {name:"Legs up the wall", dose:"5 min", note:"End here. Total decompression."},
          {name:"Box breathing", dose:"5 min", note:"Full parasympathetic reset."}
        ]
      },
      {
        title: "Kick-up and 360 skill practice", time: "20 min", dot: "dot-skill",
        exercises: [
          {name:"Kick-up drilling", dose:"3 x 10 attempts", note:"Clean technique only. Rest between sets."},
          {name:"360 kick — slow rotation", dose:"3 x 5 each side", note:"Spot landing. No rushing spin speed."},
          {name:"Jump and tuck", dose:"3 x 8", note:"Explosive hip flexion. Feeds both kick-ups and aerial work."},
          {name:"Cartwheel", dose:"3 x 5 each side", note:"Keep it clean. Foundation for future aerials."}
        ]
      }
    ]
  },
  {
    day: "Sun", label: "Full rest",
    tags: [["rest","tag-rest"]],
    rest: true, twoA: false,
    sessions: []
  }
];

let openDay = null;
let openSessions = {};
let done = [];
try { done = JSON.parse(localStorage.getItem('combat_w1') || '[]'); } catch(e){}

function renderAll() {
  const list = document.getElementById('days-list');
  list.innerHTML = '';
  const trainDays = schedule.filter(d => !d.rest).length;
  const doneCount = done.length;
  document.getElementById('prog').style.width = Math.round(doneCount / trainDays * 100) + '%';
  document.getElementById('prog-txt').textContent = `${doneCount} / ${trainDays} done`;

  schedule.forEach((day, di) => {
    const isDone = done.includes(di);
    const isOpen = openDay === di;
    const row = document.createElement('div');
    row.className = 'day-row' + (isDone ? ' completed' : '') + (day.rest ? ' rest-day' : '') + (isOpen ? ' open' : '');

    const tagsHtml = day.tags.map(([label, cls]) => `<span class="tag ${cls}">${label}</span>`).join('');

    const checkHtml = day.rest ? '' : `
      <button class="check-btn ${isDone ? 'checked' : ''}" onclick="event.stopPropagation(); toggleDone(${di})" title="mark done">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="#0e0e0e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>`;

    const chevronHtml = day.rest ? '' : `<span class="chevron">▾</span>`;

    row.innerHTML = `
      <div class="day-header" ${day.rest ? '' : `onclick="toggleDay(${di})"`}>
        <div class="day-num">${day.day}</div>
        <div class="day-info">
          <div class="day-name">${day.label}</div>
          <div class="day-tags">${tagsHtml}</div>
        </div>
        <div class="day-right">${checkHtml}${chevronHtml}</div>
      </div>`;

    if (!day.rest && isOpen) {
      const panel = document.createElement('div');
      panel.className = 'sessions-panel';

      day.sessions.forEach((sess, si) => {
        const key = `${di}-${si}`;
        const isSessOpen = openSessions[key];
        const sessBlock = document.createElement('div');
        sessBlock.className = 'session-block' + (isSessOpen ? ' open' : '');

        const exHtml = sess.exercises.map(ex => `
          <div class="ex-item">
            <div class="ex-left">
              <div class="ex-name">${ex.name}</div>
              ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
            </div>
            <div class="ex-dose">${ex.dose}</div>
          </div>`).join('');

        sessBlock.innerHTML = `
          <div class="session-header" onclick="toggleSession('${key}')">
            <div class="session-title">
              <div class="dot ${sess.dot}"></div>
              ${sess.title}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="session-time">${sess.time}</span>
              <span class="session-chevron">▾</span>
            </div>
          </div>
          <div class="exercises-list">${exHtml}</div>`;

        panel.appendChild(sessBlock);
      });

      row.appendChild(panel);
    }

    list.appendChild(row);
  });
}

function toggleDay(di) {
  openDay = openDay === di ? null : di;
  renderAll();
}

function toggleSession(key) {
  openSessions[key] = !openSessions[key];
  renderAll();
}

function toggleDone(di) {
  if (done.includes(di)) { done = done.filter(x => x !== di); }
  else { done.push(di); }
  try { localStorage.setItem('combat_w1', JSON.stringify(done)); } catch(e){}
  renderAll();
}

function resetAll() {
  if (confirm('Reset all progress for this week?')) {
    done = [];
    openDay = null;
    openSessions = {};
    try { localStorage.removeItem('combat_w1'); } catch(e){}
    renderAll();
  }
}

renderAll();
</script>
